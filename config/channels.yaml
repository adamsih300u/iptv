# Curated channel allow-list for Emby.
#
# - Channels with a public stream in iptv-org/database are resolved automatically.
# - Channels with no stream are skipped with a build warning (and will appear later
#   when a stream is contributed upstream).
# - Optional `override` supplies your own stream URL (your responsibility to source legally).
#   Example for CNN.us (DMCA-blocklisted upstream):
#
#   - id: CNN.us
#     override:
#       url: https://example.com/your-legal-stream.m3u8
#       title: CNN
#       referrer: https://example.com/
#       userAgent: Mozilla/5.0

